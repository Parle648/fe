<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Release Notifier</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg-page: #f5f5f4;
        --bg-surface: #ffffff;
        --bg-muted: #f5f5f4;
        --bg-success: #f0fdf4;
        --bg-error: #fef2f2;
        --bg-info: #eff6ff;
        --bg-warn: #fffbeb;
        --text-primary: #1c1c1c;
        --text-secondary: #6b7280;
        --text-tertiary: #9ca3af;
        --text-success: #166534;
        --text-error: #991b1b;
        --text-info: #1e40af;
        --text-warn: #92400e;
        --border: rgba(0, 0, 0, 0.1);
        --border-med: rgba(0, 0, 0, 0.18);
        --border-success: #bbf7d0;
        --border-error: #fecaca;
        --border-info: #bfdbfe;
        --border-warn: #fde68a;
        --radius-md: 8px;
        --radius-lg: 12px;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg-page: #111110;
          --bg-surface: #1c1c1a;
          --bg-muted: #232321;
          --bg-success: #052e16;
          --bg-error: #450a0a;
          --bg-info: #1e3a5f;
          --bg-warn: #451a03;
          --text-primary: #f5f5f3;
          --text-secondary: #9ca3af;
          --text-tertiary: #6b7280;
          --text-success: #86efac;
          --text-error: #fca5a5;
          --text-info: #93c5fd;
          --text-warn: #fcd34d;
          --border: rgba(255, 255, 255, 0.1);
          --border-med: rgba(255, 255, 255, 0.18);
          --border-success: #166534;
          --border-error: #7f1d1d;
          --border-info: #1e3a5f;
          --border-warn: #78350f;
        }
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial,
          sans-serif;
        background: var(--bg-page);
        color: var(--text-primary);
        min-height: 100vh;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 3rem 1rem 4rem;
      }

      .wrap {
        width: 100%;
        max-width: 520px;
      }

      /* Logo */
      .logo {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 2rem;
      }
      .logo-icon {
        width: 40px;
        height: 40px;
        background: var(--bg-surface);
        border: 0.5px solid var(--border-med);
        border-radius: var(--radius-md);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .logo-icon svg {
        width: 22px;
        height: 22px;
        stroke: var(--text-primary);
      }
      .logo-name {
        font-size: 16px;
        font-weight: 500;
        color: var(--text-primary);
      }
      .logo-desc {
        font-size: 13px;
        color: var(--text-secondary);
        margin-top: 1px;
      }

      /* Card */
      .card {
        background: var(--bg-surface);
        border: 0.5px solid var(--border);
        border-radius: var(--radius-lg);
        overflow: hidden;
      }

      /* Tabs */
      .tabs {
        display: flex;
        border-bottom: 0.5px solid var(--border);
      }
      .tab {
        flex: 1;
        padding: 14px 8px;
        font-size: 13px;
        font-weight: 400;
        color: var(--text-secondary);
        background: transparent;
        border: none;
        cursor: pointer;
        transition: all 0.15s;
        white-space: nowrap;
      }
      .tab.active {
        color: var(--text-primary);
        font-weight: 500;
        border-bottom: 2px solid var(--text-primary);
        margin-bottom: -0.5px;
      }
      .tab:hover:not(.active) {
        background: var(--bg-muted);
        color: var(--text-primary);
      }

      /* Panels */
      .panel {
        padding: 1.5rem;
        display: none;
      }
      .panel.active {
        display: block;
      }

      /* Form */
      .field {
        margin-bottom: 1.25rem;
      }
      label {
        display: block;
        font-size: 13px;
        color: var(--text-secondary);
        margin-bottom: 6px;
      }
      input[type="text"],
      input[type="email"] {
        width: 100%;
        padding: 9px 12px;
        font-size: 14px;
        color: var(--text-primary);
        background: var(--bg-surface);
        border: 0.5px solid var(--border-med);
        border-radius: var(--radius-md);
        outline: none;
        transition: border-color 0.15s;
      }
      input[type="text"]:focus,
      input[type="email"]:focus {
        border-color: var(--text-secondary);
        box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.06);
      }
      input::placeholder {
        color: var(--text-tertiary);
      }
      .hint {
        font-size: 12px;
        color: var(--text-tertiary);
        margin-top: 5px;
      }

      /* Buttons */
      .btn-primary {
        width: 100%;
        padding: 10px 16px;
        background: var(--text-primary);
        color: var(--bg-surface);
        border: none;
        border-radius: var(--radius-md);
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: opacity 0.15s;
      }
      .btn-primary:hover {
        opacity: 0.85;
      }
      .btn-primary:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .btn-secondary {
        flex: 1;
        padding: 10px 16px;
        background: transparent;
        color: var(--text-secondary);
        border: 0.5px solid var(--border-med);
        border-radius: var(--radius-md);
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.15s;
      }
      .btn-secondary:hover {
        background: var(--bg-muted);
        color: var(--text-primary);
      }
      .btn-lookup {
        flex-shrink: 0;
        padding: 9px 16px;
        background: var(--bg-muted);
        color: var(--text-primary);
        border: 0.5px solid var(--border-med);
        border-radius: var(--radius-md);
        font-size: 14px;
        cursor: pointer;
        transition: all 0.15s;
      }
      .btn-lookup:hover {
        background: var(--bg-surface);
      }

      .row {
        display: flex;
        gap: 8px;
      }
      .row input {
        flex: 1;
      }

      /* Toast */
      .toast {
        display: none;
        align-items: flex-start;
        gap: 10px;
        padding: 11px 13px;
        border-radius: var(--radius-md);
        font-size: 13px;
        margin-bottom: 1.25rem;
        line-height: 1.5;
      }
      .toast.show {
        display: flex;
      }
      .toast.success {
        background: var(--bg-success);
        border: 0.5px solid var(--border-success);
        color: var(--text-success);
      }
      .toast.error {
        background: var(--bg-error);
        border: 0.5px solid var(--border-error);
        color: var(--text-error);
      }
      .toast.info {
        background: var(--bg-info);
        border: 0.5px solid var(--border-info);
        color: var(--text-info);
      }
      .toast.warn {
        background: var(--bg-warn);
        border: 0.5px solid var(--border-warn);
        color: var(--text-warn);
      }
      .toast-icon {
        flex-shrink: 0;
        margin-top: 1px;
      }

      /* Subscription list */
      .divider {
        height: 0.5px;
        background: var(--border);
        margin: 1.25rem 0;
      }
      .subs-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .sub-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 14px;
        background: var(--bg-muted);
        border: 0.5px solid var(--border);
        border-radius: var(--radius-md);
      }
      .sub-repo {
        font-size: 14px;
        font-weight: 500;
      }
      .sub-meta {
        font-size: 12px;
        color: var(--text-secondary);
        margin-top: 2px;
      }
      .badge {
        font-size: 11px;
        font-weight: 500;
        padding: 3px 9px;
        border-radius: 99px;
        flex-shrink: 0;
      }
      .badge.confirmed {
        background: var(--bg-success);
        color: var(--text-success);
      }
      .badge.pending {
        background: var(--bg-warn);
        color: var(--text-warn);
      }
      .empty {
        text-align: center;
        padding: 2rem;
        color: var(--text-secondary);
        font-size: 14px;
      }

      /* Loading dots */
      .dots {
        display: inline-flex;
        gap: 4px;
        align-items: center;
        vertical-align: middle;
      }
      .dots span {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: currentColor;
        animation: bounce 0.9s infinite ease-in-out;
      }
      .dots span:nth-child(2) {
        animation-delay: 0.15s;
      }
      .dots span:nth-child(3) {
        animation-delay: 0.3s;
      }
      @keyframes bounce {
        0%,
        60%,
        100% {
          transform: translateY(0);
        }
        30% {
          transform: translateY(-4px);
        }
      }

      .footer {
        font-size: 12px;
        color: var(--text-tertiary);
        text-align: center;
        margin-top: 1.25rem;
      }
      .btn-row {
        display: flex;
        gap: 8px;
        margin-top: 0.25rem;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="logo">
        <div class="logo-icon">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"
            />
          </svg>
        </div>
        <div>
          <div class="logo-name">Release notifier</div>
          <div class="logo-desc">GitHub release alerts by email</div>
        </div>
      </div>

      <div class="card">
        <div class="tabs">
          <button class="tab active" onclick="switchTab('subscribe')">
            Subscribe
          </button>
          <button class="tab" onclick="switchTab('manage')">
            My subscriptions
          </button>
          <button class="tab" onclick="switchTab('token')">
            Confirm / unsubscribe
          </button>
        </div>

        <!-- ── Subscribe ── -->
        <div class="panel active" id="tab-subscribe">
          <div id="t-sub" class="toast"></div>
          <div class="field">
            <label for="s-email">Email address</label>
            <input
              type="email"
              id="s-email"
              placeholder="you@example.com"
              oninput="clearToast('t-sub')"
            />
          </div>
          <div class="field">
            <label for="s-repo">GitHub repository</label>
            <input
              type="text"
              id="s-repo"
              placeholder="owner/repository"
              oninput="clearToast('t-sub')"
            />
            <div class="hint">
              Example: golang/go &nbsp;·&nbsp; microsoft/vscode &nbsp;·&nbsp;
              facebook/react
            </div>
          </div>
          <button class="btn-primary" id="btn-sub" onclick="doSubscribe()">
            Subscribe
          </button>
        </div>

        <!-- ── Manage ── -->
        <div class="panel" id="tab-manage">
          <div id="t-manage" class="toast"></div>
          <div class="field">
            <label>Look up by email</label>
            <div class="row">
              <input
                type="email"
                id="m-email"
                placeholder="you@example.com"
                onkeydown="if (event.key === 'Enter') doFetchSubs();"
              />
              <button class="btn-lookup" onclick="doFetchSubs()">
                Look up
              </button>
            </div>
          </div>
          <div id="subs-container"></div>
        </div>

        <!-- ── Confirm / unsubscribe ── -->
        <div class="panel" id="tab-token">
          <div id="t-token" class="toast"></div>
          <div class="field">
            <label for="c-token">Token from your email</label>
            <input
              type="text"
              id="c-token"
              placeholder="Paste the long string from the link"
              oninput="clearToast('t-token')"
            />
            <div class="hint">
              Copy the token that appears after /confirm/ or /unsubscribe/ in
              the link we sent you.
            </div>
          </div>
          <div class="btn-row">
            <button
              class="btn-primary"
              id="btn-confirm"
              onclick="doConfirm()"
              style="flex: 1"
            >
              Confirm subscription
            </button>
            <button
              class="btn-secondary"
              id="btn-unsub"
              onclick="doUnsubscribe()"
            >
              Unsubscribe
            </button>
          </div>
        </div>
      </div>

      <p class="footer">
        A confirmation email is always sent before activating any subscription.
      </p>
    </div>

    <script>
      /* ── Config ─────────────────────────────────────────────────── */
      const API = "https://ses-6-0.onrender.com/"; // set to your API base URL, e.g. 'https://api.example.com'

      /* ── Tab switching ──────────────────────────────────────────── */
      function switchTab(name) {
        const names = ["subscribe", "manage", "token"];
        document.querySelectorAll(".tab").forEach((el, i) => {
          el.classList.toggle("active", names[i] === name);
        });
        document.querySelectorAll(".panel").forEach((el) => {
          el.classList.toggle("active", el.id === "tab-" + name);
        });
      }

      /* ── Toast helpers ──────────────────────────────────────────── */
      const ICONS = {
        success: `<svg class="toast-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>`,
        error: `<svg class="toast-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
        info: `<svg class="toast-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="12" x2="12" y2="16"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>`,
        warn: `<svg class="toast-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
      };

      function showToast(id, type, msg) {
        const el = document.getElementById(id);
        el.className = `toast ${type} show`;
        el.innerHTML = (ICONS[type] || "") + `<span>${msg}</span>`;
      }

      function clearToast(id) {
        const el = document.getElementById(id);
        el.className = "toast";
        el.innerHTML = "";
      }

      /* ── Button loading state ───────────────────────────────────── */
      function setLoading(id, on, label) {
        const el = document.getElementById(id);
        if (!el) return;
        el.disabled = on;
        el.innerHTML = on
          ? `<span class="dots"><span></span><span></span><span></span></span>`
          : label;
      }

      /* ── Validation helpers ─────────────────────────────────────── */
      const validEmail = (e) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);
      const validRepo = (r) => /^[^/]+\/[^/]+$/.test(r);
      const esc = (s) =>
        String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      function formatDate(s) {
        try {
          return new Date(s).toLocaleDateString(undefined, {
            year: "numeric",
            month: "short",
            day: "numeric",
          });
        } catch {
          return s || "—";
        }
      }

      /* ── Subscribe ──────────────────────────────────────────────── */
      async function doSubscribe() {
        const email = document.getElementById("s-email").value.trim();
        const repo = document.getElementById("s-repo").value.trim();
        clearToast("t-sub");

        if (!validEmail(email))
          return showToast(
            "t-sub",
            "error",
            "Please enter a valid email address.",
          );
        if (!validRepo(repo))
          return showToast(
            "t-sub",
            "error",
            "Repository must be in owner/repository format (e.g. golang/go).",
          );

        setLoading("btn-sub", true);
        try {
          const res = await fetch(`${API}/subscribe`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, repo }),
          });
          const data = await res.json();

          if (res.ok) {
            showToast(
              "t-sub",
              "success",
              data.message ||
                "Success! Check your inbox to confirm the subscription.",
            );
            document.getElementById("s-email").value = "";
            document.getElementById("s-repo").value = "";
          } else if (res.status === 409) {
            showToast(
              "t-sub",
              "warn",
              "This email is already subscribed to that repository.",
            );
          } else if (res.status === 404) {
            showToast(
              "t-sub",
              "error",
              `Repository "${esc(repo)}" was not found on GitHub.`,
            );
          } else if (res.status === 400) {
            showToast(
              "t-sub",
              "error",
              data.message || "Invalid request. Check your inputs.",
            );
          } else {
            showToast(
              "t-sub",
              "error",
              data.message || "Something went wrong. Please try again.",
            );
          }
        } catch {
          showToast(
            "t-sub",
            "error",
            "Could not reach the server. Check your connection and try again.",
          );
        }
        setLoading("btn-sub", false, "Subscribe");
      }

      /* ── Fetch subscriptions ────────────────────────────────────── */
      async function doFetchSubs() {
        const email = document.getElementById("m-email").value.trim();
        const container = document.getElementById("subs-container");
        clearToast("t-manage");

        if (!validEmail(email))
          return showToast(
            "t-manage",
            "error",
            "Please enter a valid email address.",
          );

        container.innerHTML = `<div class="empty"><span class="dots"><span></span><span></span><span></span></span></div>`;

        try {
          const res = await fetch(
            `${API}/subscriptions?email=${encodeURIComponent(email)}`,
          );
          const data = await res.json();

          if (!res.ok) {
            container.innerHTML = "";
            return showToast(
              "t-manage",
              "error",
              data.message || "Could not fetch subscriptions.",
            );
          }

          if (!data.subscriptions || data.subscriptions.length === 0) {
            container.innerHTML = `<div class="empty">No active subscriptions found for this email.</div>`;
            return;
          }

          container.innerHTML = `
        <div class="divider"></div>
        <div class="subs-list">
          ${data.subscriptions
            .map(
              (s) => `
            <div class="sub-item">
              <div>
                <div class="sub-repo">${esc(s.repo)}</div>
                <div class="sub-meta">
                  Since ${formatDate(s.createdAt)}
                  ${s.lastSeenTag ? " &nbsp;·&nbsp; last seen " + esc(s.lastSeenTag) : ""}
                </div>
              </div>
              <span class="badge ${s.confirmed ? "confirmed" : "pending"}">
                ${s.confirmed ? "Confirmed" : "Pending"}
              </span>
            </div>
          `,
            )
            .join("")}
        </div>`;
        } catch {
          container.innerHTML = "";
          showToast(
            "t-manage",
            "error",
            "Could not reach the server. Check your connection.",
          );
        }
      }

      /* ── Confirm ────────────────────────────────────────────────── */
      async function doConfirm() {
        const token = document.getElementById("c-token").value.trim();
        clearToast("t-token");
        if (!token)
          return showToast(
            "t-token",
            "error",
            "Please paste your confirmation token.",
          );

        setLoading("btn-confirm", true);
        try {
          const res = await fetch(
            `${API}/confirm/${encodeURIComponent(token)}`,
          );
          const data = await res.json();
          if (res.ok) {
            showToast(
              "t-token",
              "success",
              data.message ||
                "Subscription confirmed! You will now receive release notifications.",
            );
            document.getElementById("c-token").value = "";
          } else {
            showToast(
              "t-token",
              "error",
              data.message || "Invalid or expired confirmation token.",
            );
          }
        } catch {
          showToast(
            "t-token",
            "error",
            "Could not reach the server. Check your connection.",
          );
        }
        setLoading("btn-confirm", false, "Confirm subscription");
      }

      /* ── Unsubscribe ────────────────────────────────────────────── */
      async function doUnsubscribe() {
        const token = document.getElementById("c-token").value.trim();
        clearToast("t-token");
        if (!token)
          return showToast(
            "t-token",
            "error",
            "Please paste your unsubscribe token.",
          );
        if (
          !confirm(
            "Are you sure you want to unsubscribe from release notifications?",
          )
        )
          return;

        setLoading("btn-unsub", true);
        try {
          const res = await fetch(
            `${API}/unsubscribe/${encodeURIComponent(token)}`,
          );
          const data = await res.json();
          if (res.ok) {
            showToast(
              "t-token",
              "success",
              data.message ||
                "Successfully unsubscribed. You will no longer receive notifications.",
            );
            document.getElementById("c-token").value = "";
          } else {
            showToast(
              "t-token",
              "error",
              data.message || "Invalid or expired unsubscribe token.",
            );
          }
        } catch {
          showToast(
            "t-token",
            "error",
            "Could not reach the server. Check your connection.",
          );
        }
        setLoading("btn-unsub", false, "Unsubscribe");
      }
    </script>
  </body>
</html>
